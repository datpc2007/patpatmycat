<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cat Pat">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fffdf5">
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<script>
  // Tạo manifest động để start_url luôn đúng bất kể deploy ở đâu
  const base = location.pathname.replace(/\/[^/]*$/, '/');
  const manifest = {
    name: "PatPat My Cat",
    short_name: "Cat Pat",
    description: "Pat the cat!",
    display: "fullscreen",
    background_color: "#fffdf5",
    theme_color: "#fffdf5",
    start_url: base,
    scope: base,
    id: base,
    icons: [
      { src: base + "icon.png", sizes: "192x192", type: "image/png", purpose: "any maskable" },
      { src: base + "icon.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fffdf5; overflow:hidden; width:100vw; height:100vh; cursor:none; user-select:none; }
canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const IMG_SLEEP = new Image(); IMG_SLEEP.src = "image/cat_sleep.png";
const IMG_STARE = new Image(); IMG_STARE.src = "image/cat_stare.png";
const IMG_HEAD  = new Image(); IMG_HEAD.src  = "image/cat_head.png";
const HANDS = [0,1,2,3,4].map(i => { const img = new Image(); img.src = `image/hand${i}.png`; return img; });

function mkAudio(src) {
  const a = new Audio(src);
  a.preload = 'auto';
  return a;
}
const SND_PATS  = [mkAudio("sound/pat0.ogg"), mkAudio("sound/pat1.ogg"), mkAudio("sound/pat2.ogg")];
const SND_BRUH  = mkAudio("sound/bruh.ogg");
const SND_CRAZY = mkAudio("sound/crazy.ogg");

function playPat()   { const s=SND_PATS[Math.floor(Math.random()*SND_PATS.length)]; s.currentTime=0; s.play().catch(()=>{}); }
function playBruh()  { SND_BRUH.currentTime=0;  SND_BRUH.play().catch(()=>{}); }
function playCrazy() { SND_CRAZY.currentTime=0; SND_CRAZY.play().catch(()=>{}); }

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  resetDimensions();
});

let CAT_W, CAT_H, CAT_X, CAT_Y;
let HEAD_CX, HEAD_CY;
let HEAD_BASE;

function resetDimensions() {
  const sz = Math.min(W, H);
  CAT_W = sz * 0.7;
  CAT_H = sz;
  CAT_X = W/2 - CAT_W/2;
  CAT_Y = H/2 + CAT_H/2 - CAT_H;
  HEAD_BASE = sz * 0.6;
  HEAD_CX = (CAT_X + CAT_W) - HEAD_BASE/2;
  HEAD_CY = CAT_Y + HEAD_BASE/2 - sz*0.075;
}
resetDimensions();

let state = {};
function resetGame() {
  state = {
    handFrame: 0, frameCounter: 0, handLoopCounter: 0,
    patPlay: false, mx: W/2, my: H/2,
    stareRandom: 0, stareCounter: 0,
    catIsStaring: false, displayHead: false,
    headTickMs: 0,
    headScale: 1.0,
    stareTickMs: 0,
    canPat: true, score: 0,
    gameOver: false, gameOverAlpha: 0,
  };
}
resetGame();

let particles = [];
function updateParticles() {
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.04;
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
}

function circleRect(cx,cy,cr,rx,ry,rw,rh) {
  const nx=Math.max(rx,Math.min(cx,rx+rw)), ny=Math.max(ry,Math.min(cy,ry+rh));
  return (cx-nx)**2+(cy-ny)**2<=cr*cr;
}

function drawCat(frameIdx, isStaring) {
  const img = isStaring ? IMG_STARE : IMG_SLEEP;
  let dw = CAT_W, dh = CAT_H;
  if (!isStaring) {
    const sf = frameIdx===0 ? 1 : 1-0.03*frameIdx;
    dh = CAT_H * sf;
  }
  const dx = W/2 - dw/2;
  const dy = H/2 + CAT_H/2 - dh;
  ctx.drawImage(img, dx, dy, dw, dh);
  if (!isStaring) {
    const t = performance.now()/1000;
    const zOff = (Math.sin(t*1.2)+1)*4;
    ctx.fillStyle = 'rgba(50,50,50,0.6)';
    ctx.font = `bold ${Math.min(W,H)*0.05}px Roboto`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('z..Z..z', W/2+dw*0.38, dy + dh*0.08 + zOff);
  }
  return { x: dx, y: dy, w: dw, h: dh };
}

function drawHand(mx, my, frame) {
  const img = HANDS[frame];
  const sz = Math.min(W,H)*0.22;
  ctx.drawImage(img, mx-sz/2, my-sz/2, sz, sz);
  return { cx:mx, cy:my, r:sz*0.38 };
}

function drawBigHead(scale) {
  const w = HEAD_BASE * scale, h = HEAD_BASE * scale;
  ctx.drawImage(IMG_HEAD, HEAD_CX-w/2, HEAD_CY-h/2, w, h);
}

function drawScore(score) {
  ctx.fillStyle='#222';
  ctx.font=`bold ${Math.min(W,H)*0.18}px Roboto`;
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText(score, 30, 30);
}

const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const FRAME_DELAY_MS  = 40;
const STARE_TIMEOUT   = 1500;
const HEAD_APPEAR_MS  = 340;
const HEAD_GROW_SPEED = 0.05;
let lastTs = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = lastTs ? Math.min(ts - lastTs, 50) : 16;
  lastTs = ts;
  const s = state;

  ctx.fillStyle='#fffdf5';
  ctx.fillRect(0,0,W,H);

  if (!s.gameOver) {
    const frameForCat = (s.patPlay && !s.catIsStaring) ? s.handFrame : 0;
    const catRect = drawCat(frameForCat, s.catIsStaring);

    let handPos = null;
    if (s.canPat) {
      if (!isMobile) {
        drawHand(s.mx, s.my, s.patPlay ? s.handFrame : 0);
        handPos = { cx: s.mx, cy: s.my, r: Math.min(W,H)*0.22*0.38 };
      } else if (s.patPlay) {
        drawHand(s.mx, s.my, s.handFrame);
        handPos = { cx: s.mx, cy: s.my, r: Math.min(W,H)*0.22*0.38 };
      }
    }

    const hit = s.patPlay && s.canPat && handPos &&
      circleRect(handPos.cx, handPos.cy, handPos.r, catRect.x, catRect.y, catRect.w, catRect.h);

    if (s.patPlay && s.canPat) {
      if (hit) {
        s.stareCounter++;
        if (s.stareCounter >= s.stareRandom && !s.catIsStaring) {
          playBruh();
          s.catIsStaring = true;
          s.displayHead  = false;
          s.headTickMs   = 0;
          s.headScale    = 1.0;
          s.stareTickMs  = 0;
        }
        s.frameCounter += dt;
        if (s.frameCounter >= FRAME_DELAY_MS) {
          s.handFrame++;
          s.frameCounter = 0;
          if (s.handFrame >= 5) {
            s.handFrame = 0;
            s.handLoopCounter++;
            playPat();
            if (s.handLoopCounter >= 3) { s.score++; s.handLoopCounter=0; }
          }
        }
        if (s.catIsStaring && !s.displayHead) {
          s.headTickMs += dt;
          s.stareTickMs = 0;
          if (s.headTickMs >= HEAD_APPEAR_MS) {
            s.displayHead = true;
            s.headScale   = 1.0;
            playCrazy();
          }
        }
      } else {
        s.handFrame=0; s.frameCounter=0;
        if (s.catIsStaring && !s.displayHead) {
          s.stareTickMs += dt;
          if (s.stareTickMs >= STARE_TIMEOUT) {
            s.catIsStaring=false; s.stareTickMs=0; s.headTickMs=0;
          }
        }
      }
    } else {
      s.handFrame=0; s.frameCounter=0;
      if (s.catIsStaring && !s.displayHead) {
        s.stareTickMs += dt;
        if (s.stareTickMs >= STARE_TIMEOUT) {
          s.catIsStaring=false; s.stareTickMs=0; s.headTickMs=0;
        }
      }
    }

    if (s.catIsStaring && s.displayHead) {
      s.canPat = false;
      s.headScale += HEAD_GROW_SPEED;
      const maxScale = Math.max(W,H) / HEAD_BASE * 2;
      if (s.headScale >= maxScale) { s.headScale=maxScale; s.gameOver=true; }
      drawBigHead(s.headScale);
    }

    updateParticles();
    drawScore(s.score);

  } else {
    if (s.gameOverAlpha<1) s.gameOverAlpha+=0.04;
    ctx.fillStyle=`rgba(0,0,0,${s.gameOverAlpha})`;
    ctx.fillRect(0,0,W,H);

    const pulse = 1+Math.sin(ts*0.003)*0.03;
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.scale(pulse,pulse);
    ctx.textAlign='center'; ctx.textBaseline='middle';

    ctx.fillStyle=`rgba(220,50,50,${s.gameOverAlpha})`;
    ctx.font=`bold ${Math.min(W,H)*0.15}px Roboto`;
    ctx.fillText('YOU DIE',0,0);

    ctx.fillStyle=`rgba(255,255,255,${s.gameOverAlpha})`;
    ctx.font=`${Math.min(W,H)*0.055}px Roboto`;
    ctx.fillText(`score: ${s.score}`,0,Math.min(W,H)*0.18);

    const blink = Math.max(0,Math.sin(ts*0.002));
    ctx.fillStyle=`rgba(160,160,160,${s.gameOverAlpha*blink})`;
    ctx.font=`${Math.min(W,H)*0.03}px Roboto`;
    ctx.fillText('click to play again',0,Math.min(W,H)*0.28);
    ctx.restore();
  }
}

canvas.addEventListener('mousedown', e => {
  state.mx=e.clientX; state.my=e.clientY;
  if (state.gameOver) { resetGame(); return; }
  if (state.canPat) {
    state.patPlay=true;
    if (!state.catIsStaring) { state.stareRandom=Math.floor(Math.random()*240)+10; state.stareCounter=0; }
  }
});
canvas.addEventListener('mouseup',   ()=>{ state.patPlay=false; });
canvas.addEventListener('mousemove', e=>{ state.mx=e.clientX; state.my=e.clientY; });

canvas.addEventListener('touchstart', e=>{ e.preventDefault();
  const t=e.touches[0]; state.mx=t.clientX; state.my=t.clientY;
  if (state.gameOver) { resetGame(); return; }
  if (state.canPat) {
    state.patPlay=true;
    if (!state.catIsStaring) { state.stareRandom=Math.floor(Math.random()*240)+10; state.stareCounter=0; }
  }
}, {passive:false});
canvas.addEventListener('touchmove', e=>{ e.preventDefault();
  const t=e.touches[0]; state.mx=t.clientX; state.my=t.clientY; },{passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); state.patPlay=false; },{passive:false});

requestAnimationFrame(loop);
</script>
</body>
</html>
